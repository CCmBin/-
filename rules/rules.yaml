version: "2.1"
# LogAudit 规则库 v2.1
# 优化说明: 
#   1. 移除所有非必要注释、装饰线和宽泛说明，保留核心结构
#   2. 优化匹配规则：为关键关键词添加 \b 词边界、要求更多上下文（如参数格式、HTTP方法前缀、特定长度/重复阈值），减少误报（例如 SQL/路径穿越/XSS 避免合法静态资源或工具误触发）
#   3. 保留设计原则（精确匹配、实战来源），中低危适当宽松但收紧重复/通配
#   4. 新增2025-2026最新规则（React2Shell CVE-2025-55182 等，基于 Google Cloud Armor / AWS / Microsoft / Trend Micro 等公开 WAF 指标）
# 规则总数: 152+

rules:

  - id: SQL_UNION_SELECT
    name: SQL注入-UNION SELECT
    category: SQL注入
    severity: critical
    patterns:
      - '(?i)\bunion\s+all\s+select\s+(?:null|0x|char\(|''|[0-9])'
      - '(?i)\bunion\s+select\s+(?:null|0x|char\(|''|[0-9@])'
      - '(?i)\bunion\s+/\*[^*]*\*/\s*select'
      - '(?i)\bunion\s+%09select'
      - '(?i)uni(?:on|%6fn)\s+sel(?:ect|%65ct)'

  - id: SQL_ERROR_BASED
    name: SQL注入-报错注入
    category: SQL注入
    severity: critical
    patterns:
      - '(?i)\bextractvalue\s*\(\s*(?:1|0x[0-9a-f]+)\s*,\s*(?:concat|0x)'
      - '(?i)\bupdatexml\s*\(\s*(?:1|0x[0-9a-f]+)\s*,\s*(?:concat|0x)'
      - '(?i)\bfloor\s*\(\s*rand\s*\(\s*(?:0|1)\s*\)\s*\)\s*\*\s*2'
      - '(?i)\bexp\s*\(\s*~\s*\('
      - '(?i)\bgeometrycollection\s*\(\s*(?:select|null)'
      - '(?i)\bpolygon\s*\(\s*(?:select|null)'
      - '(?i)\bmultipoint\s*\(\s*(?:select|null)'
      - '(?i)\bname_const\s*\(\s*(?:version|user|database)\s*\('

  - id: SQL_BLIND_BOOLEAN
    name: SQL注入-布尔盲注
    category: SQL注入
    severity: high
    patterns:
      - '(?i)(?:and|or)\s+\d+\s*=\s*\d+\s*--'
      - '(?i)(?:and|or)\s+''[^'']+''\s*=\s*''[^'']*'''
      - '(?i)(?:and|or)\s+\d+\s*(?:like|between|in)\s*\d+'
      - '(?i)(?:\band\b|\bor\b)\s+(?:true|false)\s*--'
      - '(?i)1=1\s*--\s*$'
      - '(?i)1=2\s*--\s*$'
      - "(?i)(?:and|or)\\s+substring\\s*\\("
      - '(?i)(?:and|or)\s+ascii\s*\(\s*substr(?:ing)?\s*\('

  - id: SQL_BLIND_TIME
    name: SQL注入-时间盲注
    category: SQL注入
    severity: critical
    patterns:
      - '(?i)(?:and|or|;|\()\s*sleep\s*\(\s*[3-9]\d*\s*\)'
      - '(?i)\bbenchmark\s*\(\s*[1-9]\d{5,}\s*,'
      - '(?i)\bwaitfor\s+delay\s+''0*:0*:[1-9]'
      - '(?i)\bpg_sleep\s*\(\s*[1-9]'
      - '(?i)\bgenerate_series\s*\(.*repeat\s*\('
      - '(?i);.*dbms_pipe\.receive_message'

  - id: SQL_STACKED
    name: SQL注入-堆叠查询
    category: SQL注入
    severity: critical
    patterns:
      - '(?i);\s*(?:insert\s+into|update\s+\w+\s+set|delete\s+from|drop\s+(?:table|database)|create\s+(?:table|user))'
      - '(?i);\s*exec(?:ute)?\s+(?:xp_|sp_|master)'
      - '(?i);\s*declare\s+@\w+\s+'
      - '(?i);\s*select\s+(?:load_file|into\s+(?:outfile|dumpfile))'

  - id: SQL_OOB
    name: SQL注入-带外数据渗出(OOB)
    category: SQL注入
    severity: critical
    patterns:
      - '(?i)\bload_file\s*\(\s*(?:0x|char\(|concat\(|''\\\\\\\\)'
      - '(?i)\binto\s+(?:outfile|dumpfile)\s+[''"](?:/|[A-Za-z]:)'
      - '(?i)\butl_http\.request\s*\('
      - '(?i)\butl_file\.'
      - '(?i)\bdbms_ldap\.init\s*\('
      - '(?i)\bxp_dirtree\s*\('
      - '(?i)\bxp_fileexist\s*\('
      - '(?i)\bxp_subdirs\s*\('
      - '(?i)\bexec\s+master\.\.xp_'

  - id: SQL_BYPASS_WAF
    name: SQL注入-WAF绕过变形
    category: SQL注入
    severity: high
    patterns:
      - '(?i)sel/\*\*/ect'
      - '(?i)un(?:ion|%69on|%69%6fn)'
      - '(?i)%53%45%4c%45%43%54'
      - '(?i)sel\+ect'
      - '(?i)un(?:/\*+\*/)?ion(?:/\*+\*/)?sel(?:/\*+\*/)?ect'
      - '(?i)sElEcT|SeLeCt|sElEcT'
      - '(?i)0x733e6c65637420'

  - id: SQL_FUNCTIONS
    name: SQL注入-危险函数调用
    category: SQL注入
    severity: high
    patterns:
      - '(?i)\buser\s*\(\s*\)\s*(?:--| |=|<|>|\+)'
      - '(?i)\bversion\s*\(\s*\)\s*(?:--| |=|<|>|\+)'
      - '(?i)\bdatabase\s*\(\s*\)\s*(?:--| |=|<|>|\+)'
      - '(?i)information_schema\.\s*(?:tables|columns|schemata)'
      - '(?i)sys\.(?:tables|columns|objects|databases)'
      - '(?i)\bgroup_concat\s*\(\s*(?:schema_name|table_name|column_name|username|password)'
      - '(?i)\bchar\s*\(\s*(?:3[23456789]|[4-9]\d)\s*\)\s*(?:\+|,|\|\|)'

  - id: XSS_SCRIPT_TAG
    name: XSS-Script标签注入
    category: XSS
    severity: high
    patterns:
      - '(?i)<script[\s>\/]'
      - '(?i)<script\s+src\s*='
      - '(?i)%3cscript'
      - '(?i)&lt;script'
      - '(?i)<\/script\s*>'

  - id: XSS_EVENT_HANDLER
    name: XSS-DOM事件处理器
    category: XSS
    severity: high
    patterns:
      - '(?i)\bon(?:load|error|click|mouseover|mouseout|focus|blur|change|submit|reset|select|keyup|keydown|keypress|input|dblclick|contextmenu|wheel|drag|drop|copy|cut|paste|touchstart|touchend)\s*='
      - '(?i)\bonfocus\s*=\s*(?:alert|confirm|prompt|eval)\s*\('
      - '(?i)<(?:img|svg|body|iframe|input|form|a|div|span)[^>]+on\w+\s*='

  - id: XSS_JS_PROTO
    name: XSS-JavaScript协议/伪协议
    category: XSS
    severity: high
    patterns:
      - '(?i)(?:href|src|action|formaction|data|srcdoc)\s*=\s*[''"]?\s*javascript\s*:'
      - '(?i)javascript\s*:\s*(?:alert|confirm|prompt|eval|void|document)'
      - '(?i)vbscript\s*:'
      - '(?i)data\s*:\s*text/html[;,]'
      - '(?i)data\s*:\s*image/svg\+xml[;,]'

  - id: XSS_HTML_INJECT
    name: XSS-HTML标签注入
    category: XSS
    severity: medium
    patterns:
      - '(?i)<(?:iframe|object|embed|applet|meta|base|form)\s'
      - '(?i)<svg\s+(?:on\w+|xmlns)\s*='
      - '(?i)<img\s+[^>]*\bsrc\s*=\s*[^>]*\bon\w+\s*='
      - '(?i)<math\s+(?:on\w+|href)\s*='
      - '(?i)<details\s+open\s+on\w+\s*='

  - id: XSS_ENCODED
    name: XSS-编码混淆注入
    category: XSS
    severity: medium
    patterns:
      - '(?i)%3cscript%3e'
      - '(?i)%3c%73%63%72%69%70%74%3e'
      - '(?i)\\u003cscript'
      - '(?i)&#(?:60|x3c);script'
      - '(?i)\\x3cscript'
      - '(?i)<scr(?:\s|%09|%0a|%0d|/\*)ipt'

  - id: XSS_DOM
    name: XSS-DOM型注入特征
    category: XSS
    severity: medium
    patterns:
      - '(?i)(?:document\.(?:write|writeln|cookie|location|URL|referrer|domain))\s*='
      - '(?i)(?:window\.location|location\.href|location\.replace)\s*='
      - '(?i)\beval\s*\(\s*(?:unescape|atob|String\.fromCharCode)'
      - '(?i)\binnerHTML\s*=\s*[^;]*(?:location|document|window|cookie)'

  - id: CMD_INJECTION_UNIX
    name: 命令注入-Unix命令执行
    category: 命令注入
    severity: critical
    patterns:
      - '(?i)(?:;|\|{1,2}|&&|`)\s*(?:id|whoami|uname|hostname|ifconfig|ip\s+addr|cat\s+/etc/(?:passwd|shadow|hosts)|wget\s+http|curl\s+http)'
      - '(?i)\$\{\s*IFS\s*\}'
      - '(?i)\$\((?:id|whoami|uname|cat\s+/etc/passwd|ls\s+/)'
      - '(?i)`\s*(?:id|whoami|uname|cat\s+/etc/passwd)`'
      - '(?i)(?:bash|sh|zsh|ksh|csh)\s+-(?:c|i)\s+[''"]'
      - '(?i)\bnc\s+-(?:e|c)\s+/bin/(?:bash|sh)'
      - '(?i)/bin/bash\s+-i\s+>&\s+/dev/tcp/'
      - '(?i)python[23]?\s+-c\s+[''"]import\s+(?:os|socket|subprocess)'
      - '(?i)perl\s+-e\s+[''"](?:use\s+Socket|system\s*\()'

  - id: CMD_INJECTION_WIN
    name: 命令注入-Windows命令执行
    category: 命令注入
    severity: critical
    patterns:
      - '(?i)(?:;|&|\|{1,2})\s*(?:whoami|ipconfig|net\s+(?:user|group|localgroup)|systeminfo|dir\s+[a-z]:\\)'
      - '(?i)\bcmd(?:\.exe)?\s+/[cCkK]\s+'
      - '(?i)\bpowershell(?:\.exe)?\s+-(?:enc|nop|noni|w\s+hidden|exec\s+bypass|c\s+[''"])'
      - '(?i)\bwscript(?:\.exe)?\s+(?://e|//nologo)'
      - '(?i)\bcertutil\s+-(?:decode|urlcache\s+-split\s+-f)'
      - '(?i)\bbitsadmin\s+/transfer'
      - '(?i)\bmshta\s+(?:http|javascript|vbscript)'
      - '(?i)\bregsvr32\s+/s\s+/n\s+/u\s+/i:http'
      - '(?i)\brundll32\s+(?:javascript:|shell32)'
      - '(?i)\bwmic\s+(?:process\s+call\s+create|os\s+get)'

  - id: CMD_JNDI
    name: JNDI注入-Log4Shell及变形(CVE-2021-44228)
    category: 命令注入
    severity: critical
    patterns:
      - '\$\{jndi\s*:\s*(?:ldap|rmi|dns|iiop|corba|nds|nis)\s*(?:s|S)?\s*://'
      - '\$\{(?:lower|upper|:-|::-|#{lower:)\s*j\s*\}'
      - '(?i)\$\{(?:j|#{j)(?:\$\{lower:n\}|n)(?:\$\{lower:d\}|d)(?:\$\{lower:i\}|i)\s*:'
      - '(?i)\$\{(?:env|sys|java|main|k8s|spring|ctx|map|bundle|log4j|web):[^}]+\}'
      - '(?i)j%24%7Bndi'
      - '(?i)\$\{(?:[^}]*%24%7B|[^}]*#{)[^}]*\}'

  - id: TEMPLATE_INJECTION
    name: 服务端模板注入(SSTI)
    category: 命令注入
    severity: high
    patterns:
      - '\{\{\s*(?:7\s*\*\s*7|''7''~''7''|[0-9]+\s*\*\s*[0-9]+)\s*\}\}'
      - '\{\{\s*(?:config|request|self|g|namespace|lipsum|range|cycler|joiner|dict)\s*[\[\.}\|]'
      - '\{\{\s*(?:__import__|__class__|__mro__|__subclasses__|__globals__)'
      - '\{\%\s*(?:for|if|set|block|extends|import|include)[^%]*\%\}'
      - '<\%=\s*(?:[0-9]+\s*\*\s*[0-9]+|(?:system|exec|`|Runtime|ProcessBuilder))'
      - '#\{\s*[0-9]+\s*\*\s*[0-9]+\s*\}'
      - '#\{\s*(?:T\(java\.lang\.|request\.|session\.)'
      - '\$\{\s*(?:[0-9]+\s*\*\s*[0-9]+|class\.forName)'
      - '(?i)\{\{(?:.*)(exec|system|popen|subprocess|os\.system|eval)'

  - id: CODE_EVAL
    name: 代码注入-动态代码执行
    category: 命令注入
    severity: critical
    patterns:
      - '(?i)(?:\?|&)(?:code|eval|exec|cmd|command|execute|run|shell|php_code)\s*=\s*.{3,}'
      - '(?i)\beval\s*\(\s*(?:base64_decode|gzinflate|str_rot13|gzuncompress|rawurldecode)\s*\('
      - '(?i)\bassert\s*\(\s*(?:base64_decode|eval|system|exec|passthru)\s*\('
      - '(?i)\bpreg_replace\s*\(\s*[''"].*[''"].*[''"]e[''"]'
      - '(?i)\bcreate_function\s*\(\s*[''"][^'']*[''"].*(?:system|exec|eval|assert)'
      - '(?i)\bcall_user_func(?:_array)?\s*\(\s*(?:system|exec|passthru|shell_exec|assert)'

  - id: PATH_TRAVERSAL
    name: 路径穿越攻击
    category: 文件包含
    severity: high
    patterns:
      - '(?:(?:\.\./){3,}|(?:\.\.\\){3,})'
      - '(?:%2e%2e%2f){2,}'
      - '(?:%252e%252e%252f){2,}'
      - '(?:\.\.%2f){2,}'
      - '(?:\.\.%5c){2,}'
      - '(?:%c0%ae%c0%ae%c0%af){2,}'
      - '(?:\.\.\/){2,}(?:etc|windows|boot|proc|var)'
      - '(?i)(?:\.\.\/|\.\.\\){3,}'

  - id: LFI_SENSITIVE
    name: 本地文件包含-敏感系统文件
    category: 文件包含
    severity: critical
    patterns:
      - '(?i)/etc/(?:passwd|shadow|master\.passwd|group|gshadow|sudoers|hosts(?:\.allow|\.deny)?|resolv\.conf|ssh/(?:id_rsa|authorized_keys|known_hosts))'
      - '(?i)/proc/(?:self/(?:environ|cmdline|maps|fd)|version|net/(?:tcp|udp|if_inet6))'
      - '(?i)/var/log/(?:auth|secure|messages|apache2?/|nginx/)'
      - '(?i)/windows/(?:win\.ini|system32/drivers/etc/hosts|system32/config/(?:sam|system|software))'
      - '(?i)/boot/(?:grub/grub\.cfg|vmlinuz)'
      - '(?i)(?:/home/[^/]+|/root)/\.(?:bash_history|ssh/|aws/credentials|config/gcloud)'

  - id: LFI_PHP_FILTER
    name: 本地文件包含-PHP伪协议
    category: 文件包含
    severity: critical
    patterns:
      - '(?i)php://(?:filter|input|stdin|memory|temp|fd)'
      - '(?i)php://filter/(?:read=|convert\.)?(?:base64-encode|string\.rot13|zlib\.deflate)'
      - '(?i)expect://(?:id|whoami|ls|cat)'
      - '(?i)phar://'
      - '(?i)zip://'
      - '(?i)glob://'
      - '(?i)data://text/plain(?:;base64)?,'

  - id: RFI
    name: 远程文件包含(RFI)
    category: 文件包含
    severity: critical
    patterns:
      - '(?i)(?:include|require)(?:_once)?\s*[=(]\s*[''"]?https?://'
      - '(?i)(?:\?|&)(?:file|page|path|url|inc|document|root|pg|style|template|module|conf|config|lang)\s*=\s*https?://'
      - '(?i)(?:\?|&)(?:file|page|path|url|inc)\s*=\s*(?:ftp|ftps|smb|data|dict|gopher)://'
      - '(?i)allow_url_include.*https?://'

  - id: WEBSHELL_KNOWN
    name: Webshell-已知工具特征文件名
    category: Webshell
    severity: critical
    patterns:
      - '(?i)/(?:upload(?:s|ed)?|files?|attachment(?:s)?|media|static|img|tmp|temp|cache|backup|data|user(?:s)?|assets)/[^/]*\.(?:php[3457]?|phtml|phar|asp|aspx|ashx|asmx|cer|cdx|asa|shtml|jsp[x]?|jspf|jspx)$'
      - '(?i)(?:c99|r57|b374k|wso|alfa|indoxploit|p0wny|FilesMan|locus7shell|GRP_WEB|simorgh|Seman|b374|Antichat|Loeder|laudanum|tennc|Shark|Godzilla|Behinder|Cknife|Ice|AntSword|Weevely)\.(?:php|asp|aspx|jsp)'
      - '(?i)(?:shell|cmd|exec|command|hack|spy|root|exploit|backdoor|reverse|bind)\.(?:php[3457]?|phtml|asp|aspx|jsp[x]?)'
      - '(?i)\.(?:php|asp|aspx|jsp)[^/]*\.(jpg|gif|png|jpeg|bmp|ico|swf|txt|zip|rar)$'

  - id: WEBSHELL_UPLOAD_PATH
    name: Webshell-上传目录脚本访问
    category: Webshell
    severity: critical
    patterns:
      - '(?i)^(?:GET|POST)\s+/(?:upload(?:s|ed)?|files?|attachment(?:s)?|media|img|images?|static|tmp|temp|cache|data|assets|public|resource(?:s)?)/(?:[^/]+/){0,3}[^/]+\.(?:php[3457]?|phtml|phar|asp|aspx|ashx|jsp[x]?|jspf)\b'

  - id: WEBSHELL_PARAMS
    name: Webshell-典型参数特征
    category: Webshell
    severity: critical
    patterns:
      - '(?i)(?:\?|&)(?:cmd|command|exec|execute|shell|run|c|e|s|op|action|func|function|do|req|request|q|query|pass|passwd|pass1|pass2)\s*=\s*(?:id|whoami|ls|dir|cat|type|wget|curl|nc\s)'
      - '(?i)(?:\?|&)(?:cmd|command|exec|shell)\s*=\s*[^&]{5,}'
      - '(?i)(?:ant\.jar|AntSword|Behinder|Godzilla|CKnife|Neo-reGeorg|suo5|frp)(?:/|\?|$)'

  - id: WEBSHELL_BEHINDER
    name: Webshell-冰蝎/哥斯拉流量特征
    category: Webshell
    severity: critical
    patterns:
      - '(?i)(?:POST|GET)\s+.*\.(?:php|jsp|asp|aspx)\s+HTTP.*(?:Accept-Encoding.*gzip|Content-Type.*application/octet-stream)'
      - '(?i)X-Behinder-Version'
      - '(?i)Godzilla-[\d.]+'

  - id: SSRF_INTERNAL
    name: SSRF-内网地址访问
    category: SSRF
    severity: high
    patterns:
      - '(?i)(?:url|src|href|path|redirect|forward|proxy|dest|destination|target|link|host|fetch|request|load|image|img|next|callback|return|to|window|navigate|open)\s*=\s*https?://(?:127\.|0\.|10\.|172\.(?:1[6-9]|2\d|3[01])\.|192\.168\.|::1|localhost|internal|intranet)'
      - '(?i)(?:url|src|href)\s*=\s*https?://(?:169\.254\.169\.254|100\.100\.100\.200|fd00:|metadata\.google\.internal)'
      - '(?i)(?:url|src|href)\s*=\s*(?:file|dict|gopher|ftp|sftp|tftp|ldap)://'

  - id: SSRF_CLOUD_METADATA
    name: SSRF-云服务元数据接口
    category: SSRF
    severity: critical
    patterns:
      - '(?i)169\.254\.169\.254'
      - '(?i)100\.100\.100\.200'
      - '(?i)metadata\.google\.internal'
      - '(?i)/(?:latest|2021-01-03|2019-10-01)/meta-data/'
      - '(?i)/computeMetadata/v[0-9]/'
      - '(?i)/metadata/instance'
      - '(?i)fd00:ec2::254'
      - '(?i)api\.link\.aliyun\.com'

  - id: SSRF_GOPHER
    name: SSRF-Gopher协议利用
    category: SSRF
    severity: critical
    patterns:
      - '(?i)gopher://(?:127\.|0\.|10\.|172\.|192\.168\.|localhost)'
      - '(?i)gopher://[^/]+/_%(?:2a|40|47|52|53|54|55|56|57|58|59)'
      - '(?i)dict://(?:127\.|0\.|localhost)'

  - id: XXE_DOCTYPE
    name: XXE-DOCTYPE实体注入
    category: XXE
    severity: high
    patterns:
      - '(?i)<!DOCTYPE\s+\w+\s*\['
      - '(?i)<!ENTITY\s+\w+\s+SYSTEM\s+[''"](?:file|http|ftp|php|expect|data|gopher|dict)://'
      - '(?i)<!ENTITY\s+%\s+\w+\s+SYSTEM\s+[''"]'
      - '(?i)<!ENTITY\s+\w+\s+PUBLIC\s+[''"][^'']*[''"]'
      - '(?i)SYSTEM\s+[''"]file:///(?:etc/passwd|windows/win\.ini)'

  - id: DESER_JAVA
    name: 反序列化-Java序列化数据
    category: 反序列化
    severity: critical
    patterns:
      - '^(?:POST|PUT)\s+.*\s+HTTP.*rO0AB'
      - 'rO0ABXNy'
      - 'aced0005'
      - '(?i)Content-Type.*application/x-java-serialized-object'
      - '(?i)java\.(?:lang\.Runtime|io\.ObjectInputStream|util\.HashMap|rmi\.)'
      - '(?i)org\.apache\.commons\.collections'
      - '(?i)com\.sun\.org\.apache\.xalan'

  - id: DESER_PHP
    name: 反序列化-PHP序列化对象
    category: 反序列化
    severity: high
    patterns:
      - 'O:\d+:"(?:Monolog|Symfony|Guzzle|Illuminate|Laravel|Slim|Yii|Zend|Phalcon|CodeIgniter)\\'
      - '(?i)O:\d+:"\w+ThinkPHP\w*"'
      - 'O:\d+:"[A-Za-z_\\\\]+(?:Command|Shell|Exec|System|Process|Upload|File|Remote)[A-Za-z_\\\\]*"'
      - '(?i)__wakeup|__destruct|__toString.*O:\d+'

  - id: DESER_PYTHON
    name: 反序列化-Python Pickle
    category: 反序列化
    severity: critical
    patterns:
      - '(?i)(?:Content-Type.*application/x-pickle|\.pkl\s+HTTP)'
      - 'cos\nsystem\n'
      - 'cposix\nsystem\n'
      - '(?i)pickle\.loads'

  - id: DESER_DOTNET
    name: 反序列化-.NET ViewState/序列化
    category: 反序列化
    severity: high
    patterns:
      - '(?i)__VIEWSTATE=.*(?:%2f%2f|%252f|AAEAAAD)'
      - '(?i)__VIEWSTATEGENERATOR='
      - '(?i)TypeConfusionDelegate|WindowsIdentity|ObjectDataProvider'
      - '(?i)BinaryFormatter|DataContractSerializer|NetDataContractSerializer'

  - id: SCANNER_UA_TOOL
    name: 扫描器-已知安全工具UA
    category: 扫描探测
    severity: high
    patterns:
      - '(?i)(?:sqlmap|sqlninja|havij|pangolin)/[\d.]+'
      - '(?i)(?:nmap|masscan|zmap)/[\d.]+'
      - '(?i)(?:nikto|w3af|skipfish|whatweb|wapiti|arachni)/[\d.]+'
