<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>安全分析报告 — __TITLE__</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;--accent:#58a6ff;
  --critical:#ff2255;--high:#ff7700;--medium:#ffbb00;--low:#33bbff;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.6}
.wrap{max-width:1400px;margin:0 auto;padding:20px 24px}
.header{background:linear-gradient(135deg,#0d1117,#1a0a0a,#200d1a);border-bottom:2px solid #ff222533;padding:24px 32px}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{width:40px;height:40px;background:linear-gradient(135deg,#ff2255,#ff7700);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.title-block h1{font-size:20px;font-weight:700}
.title-block .sub{font-size:12px;color:var(--text2);margin-top:2px}
.risk-badge{margin-left:auto;padding:8px 18px;border-radius:8px;font-size:14px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.header-meta{display:flex;gap:20px;font-size:12px;color:var(--text2)}
.tabs{border-bottom:1px solid var(--border);display:flex;background:var(--bg);padding:0;margin-bottom:24px;overflow-x:auto;position:sticky;top:0;z-index:99}
.tab{padding:12px 20px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .2s;font-size:13px;font-weight:500;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--bg2)}
.tab.active{color:var(--critical);border-bottom-color:var(--critical)}
.tab-content{display:none}.tab-content.active{display:block}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card.danger{border-color:#ff222530}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border)}
.card-hd h3{font-size:13px;font-weight:600}
.card-bd{padding:16px 18px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.critical::before{background:var(--critical)}.kpi.high::before{background:var(--high)}
.kpi.medium::before{background:var(--medium)}.kpi.low::before{background:var(--low)}
.kpi.blue::before{background:var(--accent)}
.kpi-val{font-size:26px;font-weight:700;line-height:1.1}
.kpi-lbl{font-size:11px;color:var(--text2);margin-top:4px}
.sev{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px}
.sev-critical{background:rgba(255,34,85,.2);color:var(--critical);border:1px solid rgba(255,34,85,.4)}
.sev-high{background:rgba(255,119,0,.2);color:var(--high);border:1px solid rgba(255,119,0,.4)}
.sev-medium{background:rgba(255,187,0,.2);color:var(--medium);border:1px solid rgba(255,187,0,.4)}
.sev-low{background:rgba(51,187,255,.2);color:var(--low);border:1px solid rgba(51,187,255,.4)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:7px 10px;border-bottom:1px solid rgba(48,54,61,.5);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,34,85,.04)}
.tbl .mono{font-family:monospace;font-size:11px}
.tbl .num{text-align:right}
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{flex:1;height:6px;background:var(--bg4);border-radius:3px;min-width:40px}
.bar-fill{height:100%;border-radius:3px}
/* chart height classes */
.ch300{width:100%;height:300px}
.ch360{width:100%;height:360px}
.ch420{width:100%;height:420px}
.grp{margin-bottom:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.grp-hd{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;background:var(--bg3);transition:background .15s}
.grp-hd:hover{background:var(--bg4)}
.grp-hd .rule-name{flex:1;font-weight:600;font-size:13px}
.grp-hd .count{font-size:13px;font-weight:700;color:var(--text2)}
.grp-bd{display:none;overflow-x:auto}
.grp.open .grp-bd{display:block}
.grp-arrow{transition:transform .2s;color:var(--text2)}
.grp.open .grp-arrow{transform:rotate(90deg)}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo">🛡</div>
    <div class="title-block"><h1>安全分析报告</h1><div class="sub">__FILE_NAME__ · LogAudit v2.0</div></div>
    <div class="risk-badge" style="background:__RISK_COLOR__22;color:__RISK_COLOR__;border:1px solid __RISK_COLOR__44">⚠ __RISK_LEVEL__</div>
    <div class="header-meta"><span>🕐 __REPORT_TIME__</span><span>⏱ __DURATION__</span></div>
  </div>
</div>
<div class="wrap">
<div class="tabs">
  <div class="tab active" onclick="showTab('overview',this)">🎯 安全总览</div>
  <div class="tab" onclick="showTab('timeline',this)">📈 攻击时序</div>
  <div class="tab" onclick="showTab('ips',this)">🌐 攻击IP</div>
  <div class="tab" onclick="showTab('rules',this)">📋 规则命中</div>
  <div class="tab" onclick="showTab('hits',this)">🔍 命中详情</div>
  <div class="tab" onclick="showTab('tools',this)">🔧 攻击工具</div>
</div>
<div id="tab-overview" class="tab-content active">__SEC_OVERVIEW__</div>
<div id="tab-timeline" class="tab-content">__SEC_TIMELINE__</div>
<div id="tab-ips"      class="tab-content">__SEC_IPS__</div>
<div id="tab-rules"    class="tab-content">__SEC_RULES__</div>
<div id="tab-hits"     class="tab-content">__SEC_HITS__</div>
<div id="tab-tools"    class="tab-content">__SEC_TOOLS__</div>
</div>
<script>
var D=__JSON__;
var _done={};
var _palette=['#ff2255','#ff7700','#ffbb00','#33bbff','#58a6ff','#3fb950','#bc8cff','#f97316'];
function base(extra){return Object.assign({backgroundColor:'transparent',textStyle:{color:'#e6edf3',fontFamily:'Segoe UI,system-ui',fontSize:12}},extra);}
function mkChart(id,opt){
  var el=document.getElementById(id);if(!el)return;
  var c=echarts.init(el);c.setOption(base(opt));
  window.addEventListener('resize',function(){c.resize();});
  return c;
}
function tt(){return {trigger:'axis',backgroundColor:'#21262d',borderColor:'#30363d',textStyle:{color:'#e6edf3'}};}
function ttItem(){return {trigger:'item',backgroundColor:'#21262d',borderColor:'#30363d',formatter:'{b}: {c} ({d}%)',textStyle:{color:'#e6edf3'}};}
function sl(){return {lineStyle:{color:'#21262d',type:'dashed'}};}

function drawPie(id,data,colors){
  mkChart(id,{
    tooltip:ttItem(),
    legend:{type:'scroll',orient:'vertical',right:8,top:'middle',textStyle:{color:'#8b949e',fontSize:11},pageTextStyle:{color:'#8b949e'}},
    series:[{type:'pie',radius:['38%','65%'],center:['40%','50%'],
      data:data.map(function(d,i){return{name:d.name,value:d.value,itemStyle:{color:(colors||_palette)[i%8]}};}),
      label:{show:true,formatter:'{b}\n{d}%',color:'#e6edf3',fontSize:10},
      labelLine:{length:8,length2:6}}]
  });
}
function drawBarH(id,vals,names,colors){
  var n=names.length;
  var h=Math.max(260,n*28+60);
  var el=document.getElementById(id);if(el)el.style.height=h+'px';
  mkChart(id,{
    grid:{left:160,right:60,top:20,bottom:30,containLabel:false},
    xAxis:{type:'value',axisLabel:{color:'#8b949e'},splitLine:sl()},
    yAxis:{type:'category',data:names,axisLabel:{color:'#e6edf3',fontSize:11,width:150,overflow:'truncate'}},
    series:[{type:'bar',
      data:vals.map(function(v,i){return{value:v,itemStyle:{color:colors?colors[i]:_palette[i%8],borderRadius:[0,4,4,0]}};}),
      barMaxWidth:22,
      label:{show:true,position:'right',color:'#8b949e',fontSize:10,formatter:function(p){return p.value.toLocaleString();}}}],
    tooltip:tt()
  });
}
function drawStackBar(id,ips){
  var names=ips.map(function(x){return x.ip;});
  var n=names.length;
  var h=Math.max(260,n*28+80);
  var el=document.getElementById(id);if(el)el.style.height=h+'px';
  mkChart(id,{
    grid:{left:160,right:20,top:40,bottom:30,containLabel:false},
    legend:{top:6,textStyle:{color:'#8b949e',fontSize:11}},
    xAxis:{type:'value',axisLabel:{color:'#8b949e'},splitLine:sl()},
    yAxis:{type:'category',data:names,axisLabel:{color:'#e6edf3',fontSize:11,width:150,overflow:'truncate'}},
    series:[
      {name:'严重',type:'bar',stack:'s',data:ips.map(function(x){return x.cr;}),itemStyle:{color:'#ff2255'},barMaxWidth:18},
      {name:'高危',type:'bar',stack:'s',data:ips.map(function(x){return x.hi;}),itemStyle:{color:'#ff7700'}},
      {name:'中危',type:'bar',stack:'s',data:ips.map(function(x){return x.me;}),itemStyle:{color:'#ffbb00'}},
      {name:'低危',type:'bar',stack:'s',data:ips.map(function(x){return x.lo;}),itemStyle:{color:'#33bbff'}}],
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:'#21262d',borderColor:'#30363d',textStyle:{color:'#e6edf3'}}
  });
}
function drawLine(id,times,vals,valsCr,valsHi){
  mkChart(id,{
    grid:{left:60,right:20,top:40,bottom:60},
    legend:{top:6,textStyle:{color:'#8b949e',fontSize:11}},
    xAxis:{type:'category',data:times,axisLabel:{color:'#8b949e',rotate:45,fontSize:10},boundaryGap:false},
    yAxis:{type:'value',axisLabel:{color:'#8b949e'},splitLine:sl()},
    series:[
      {name:'总告警',type:'line',data:vals,smooth:true,lineStyle:{color:'#f97316',width:2},
        areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'#f9731655'},{offset:1,color:'#f9731605'}]}},
        itemStyle:{color:'#f97316'}},
      {name:'严重',type:'line',data:valsCr,smooth:true,lineStyle:{color:'#ff2255',width:1.5},itemStyle:{color:'#ff2255'},showSymbol:false},
      {name:'高危',type:'line',data:valsHi,smooth:true,lineStyle:{color:'#ff7700',width:1.5},itemStyle:{color:'#ff7700'},showSymbol:false}],
    tooltip:tt(),
    dataZoom:[{type:'inside'},{type:'slider',height:20,bottom:8,borderColor:'#30363d',fillerColor:'rgba(255,34,85,.2)',handleStyle:{color:'#ff2255'}}]
  });
}
function drawBarUA(id,vals,names){
  var n=names.length;
  var h=Math.max(260,n*32+60);
  var el=document.getElementById(id);if(el)el.style.height=h+'px';
  mkChart(id,{
    grid:{left:20,right:80,top:20,bottom:30,containLabel:true},
    xAxis:{type:'value',axisLabel:{color:'#8b949e'},splitLine:sl()},
    yAxis:{type:'category',data:names,axisLabel:{color:'#e6edf3',fontSize:10,width:280,overflow:'truncate',rich:{}}},
    series:[{type:'bar',data:vals.map(function(v,i){return{value:v,itemStyle:{color:_palette[i%8],borderRadius:[0,4,4,0]}};}),
      barMaxWidth:22,label:{show:true,position:'right',color:'#8b949e',fontSize:10,formatter:function(p){return p.value.toLocaleString();}}}],
    tooltip:{trigger:'axis',backgroundColor:'#21262d',borderColor:'#30363d',textStyle:{color:'#e6edf3',fontSize:11}}
  });
}
function drawRadar(id,data){
  if(!data||!data.length)return;
  mkChart(id,{
    radar:{indicator:data.map(function(x){return{name:x.n,max:x.m};}),
      axisName:{color:'#8b949e',fontSize:11},splitLine:{lineStyle:{color:'#30363d'}},
      splitArea:{areaStyle:{color:['rgba(255,34,85,.05)','rgba(255,119,0,.03)']}}},
    series:[{type:'radar',data:[{value:data.map(function(x){return x.v;}),
      areaStyle:{color:'rgba(255,34,85,.2)'},lineStyle:{color:'#ff2255',width:2},itemStyle:{color:'#ff2255'}}]}],
    tooltip:{backgroundColor:'#21262d',borderColor:'#30363d',textStyle:{color:'#e6edf3'}}
  });
}
// ── per-tab init ─────────────────────────────────────────────────────────
function initOverview(){
  if(D.sevs&&D.sevs.length) drawPie('ch-sev',D.sevs,['#ff2255','#ff7700','#ffbb00','#33bbff']);
  if(D.cats&&D.cats.length) drawPie('ch-cats',D.cats);
  if(D.radar&&D.radar.length) drawRadar('ch-radar',D.radar);
}
function initTimeline(){
  if(D.tl&&D.tl.length)
    drawLine('ch-timeline',
      D.tl.map(function(x){return x.t;}),
      D.tl.map(function(x){return x.c;}),
      D.tl.map(function(x){return x.cr||0;}),
      D.tl.map(function(x){return x.hi||0;}));
}
function initIPs(){
  if(D.ips&&D.ips.length){
    var top=D.ips.slice(0,15);
    drawBarH('ch-atk-ips',top.map(function(x){return x.total;}),top.map(function(x){return x.ip;}),
      top.map(function(_,i){return 'hsl('+(350-i*10)+',75%,55%)';}));
    drawStackBar('ch-ip-stack',top);
  }
}
function initRules(){
  if(D.rules&&D.rules.length){
    var rr=D.rules.slice(0,15);
    drawBarH('ch-rules',rr.map(function(x){return x.value;}),rr.map(function(x){return x.name.length>22?x.name.slice(0,20)+'\u2026':x.name;}));
  }
}
function initTools(){
  if(D.uaT&&D.uaT.length) drawPie('ch-ua-type',D.uaT.map(function(x){return{name:x.name,value:x.value};}));
  if(D.uaB&&D.uaB.length){
    var ub=D.uaB.slice(0,10);
    drawBarUA('ch-ua-bar',ub.map(function(x){return x.value;}),ub.map(function(x){return x.name;}));
  }
}
// ── tab switch ───────────────────────────────────────────────────────────
var _tabInits={overview:initOverview,timeline:initTimeline,ips:initIPs,rules:initRules,tools:initTools};
function showTab(name,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.toggle('active',c.id==='tab-'+name);});
  el.classList.add('active');
  if(!_done[name]&&_tabInits[name]){setTimeout(function(){_tabInits[name]();_done[name]=1;},30);}
}
window.addEventListener('load',function(){initOverview();_done['overview']=1;});
function toggleGrp(el){el.parentElement.classList.toggle('open');}
</script>
</body>
</html>
